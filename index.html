<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>元祖· 米歇尔华容道</title>
    <meta name="description" content="BanGDream 米歇尔华容道" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #4a6741;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        user-select: none;
        -webkit-user-select: none;
        overflow: hidden;
      }

      #game-wrapper {
        position: relative;
        overflow: hidden;
      }

      #game-wrapper img.board-bg {
        display: block;
        width: 960px;
        height: 540px;
        pointer-events: none;
      }

      /* 棋盘网格区域 — 基于 board1.png 像素测量 */
      #board {
        position: absolute;
        top: 4.8%;
        left: 25.3%;
        width: 49.5%;
        height: 89.5%;
        overflow: hidden;
      }

      /* 内部棋盘容器：用于相对定位 */
      #board-inner {
        position: relative;
        width: 960px;
        height: 540px;
        margin: 0 auto;
      }

      /* 电梯楼层像素数字（改为文本显示，支持多位） */
      #elevator-floor {
        position: absolute;
        left: 4.4%;
        top: 23%;
        width: 14%;
        height: 18%;
        z-index: 5;
        pointer-events: auto;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Courier New', monospace;
        /* 响应式字体，相对于父容器 */
        font-weight: bold;
        color: #f3ae4e;
        /* text-shadow: 2px 2px 0 #b3742e; 去除重影 */
        line-height: 1;
        padding: 5px;
        box-sizing: border-box;
		cursor: pointer;
      }
	  /* 测试用二维码 */
	.qr-code {
		position: absolute;
		left: 4.4%;
		top: 50%;
		width: 14%;
		height: auto;
		z-index: 5;
		pointer-events: none;
		opacity: 0.9;
		border-radius: 8px;
	}
      /* 桌面端字体固定大小 */
      @media (min-width: 781px) {
        #elevator-floor {
          font-size: 50px;
        }
      }

      .block {
        position: absolute;
        cursor: grab;
        transition:
          left 0.18s ease-out,
          top 0.18s ease-out;
        border-radius: 6px;
        overflow: hidden;
        z-index: 1;
      }

      .block.dragging {
        transition: none;
        cursor: grabbing;
        z-index: 50;
        filter: brightness(1.05);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      }

      .block:hover {
        z-index: 10;
        filter: brightness(1.08);
      }

      .block:active {
        cursor: grabbing;
      }

      .block img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        pointer-events: none;
      }

      /* 控制面板 — 右侧 */
      #control-panel {
        position: absolute;
        top: 55%;
        right: 5%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 20;
      }

      #step-label {
        color: #c4a96a;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      #step-display {
        color: #e8b74a;
        font-size: 52px;
        font-weight: 900;
        font-family: "Courier New", monospace;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        line-height: 1;
      }

      .btn {
        padding: 8px 4px;
        border: 2px solid #e8b74a;
        background: rgba(0, 0, 0, 0.6);
        color: #e8b74a;
        font-size: 14px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: "Microsoft YaHei", sans-serif;
        width: 90px;
        text-align: center;
      }

      .btn:hover:not(#btn-voice):not(.floor-btn) {
        background: #e8b74a;
        color: #1a1a1a;
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn.toggle-on {
        background: #e8b74a;
        color: #1a1a1a;
      }

      /* 自定义楼层控件 */
      .floor-control {
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: 5px;
      }
      .floor-control input {
        width: 80px;
        padding: 6px 4px;
        background: rgba(0, 0, 0, 0.7);
        border: 2px solid #e8b74a;
        color: #e8b74a;
        font-weight: bold;
        border-radius: 20px;
        outline: none;
        font-size: 16px;
        text-align: center;
        font-family: 'Courier New', monospace;
      }
      .floor-control .btn {
        width: auto;
        padding: 6px 12px;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.6);
        border-color: #e8b74a;
        color: #e8b74a;
      }
      .floor-control .btn:hover {
        background: #e8b74a;
        color: #1a1a1a;
      }

      /* 胜利结算界面 */
      #victory-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 300;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease;
      }

      #victory-overlay.show {
        display: flex;
      }

      #victory-box {
        background: linear-gradient(135deg, #ff6b9d, #c44569);
        border: 4px solid #fff;
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        color: #fff;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: popIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      }

      #victory-box h2 {
        font-size: 36px;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      #victory-box p {
        font-size: 20px;
        margin-bottom: 24px;
        opacity: 0.9;
      }

      #victory-box .btn {
        font-size: 16px;
        padding: 10px 28px;
        border-color: #fff;
        color: #fff;
        background: rgba(255, 255, 255, 0.15);
        width: auto;
      }

      #victory-box .btn:hover {
        background: #fff;
        color: #c44569;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes popIn {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      /* ===== 新增链接容器 ===== */
      .repo-links {
        position: absolute;
        top: 8px;
        right: 2%;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .repo-link {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 14px;
        background: rgba(0, 0, 0, 0.6);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        transition: all 0.25s ease;
        backdrop-filter: blur(6px);
        white-space: nowrap;
      }

      .repo-link:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: #e8b74a;
        color: #e8b74a;
        transform: scale(1.05);
      }

      .repo-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .repo-link .star-icon {
        width: 14px;
        height: 14px;
      }

      /* B站链接粉色辉光 */
      .bili-link {
        border-color: #fb7299;
      }

      .bili-link:hover {
        border-color: #ffa0c0;
        color: #ffa0c0;
        box-shadow: 0 0 15px #fb7299, 0 0 30px #fb7299;
      }

      .bili-link svg.play-icon {
        width: 16px;
        height: 16px;
      }

      /* 响应式适配 — 完美支持横竖屏 */
      @media (max-width: 780px) {
        #game-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        #board-inner {
          width: 100vw;
          height: auto;
          aspect-ratio: 16 / 9;
          flex-shrink: 0;
        }

        #game-wrapper img.board-bg {
          width: 100%;
          height: 100%;
        }

        #control-panel {
          position: static;
          transform: none;
          flex-direction: row;
          flex-wrap: wrap;
          gap: 10px;
          z-index: 20;
          width: 100%;
          justify-content: center;
          margin-top: 10px;
          padding-bottom: 20px;
        }

        #step-label {
          display: block;
          font-size: 14px;
          margin-right: -8px;
        }
        #step-display {
          font-size: 24px;
          margin-right: 8px;
        }
        .btn {
          font-size: 12px;
          padding: 6px 10px;
          width: auto;
          min-width: 50px;
        }
        .floor-control {
          width: 100%;
          justify-content: center;
          order: 1;
        }
        .floor-control input {
          width: 100px;
          font-size: 14px;
        }

        /* 移动端链接容器 */
        .repo-links {
          gap: 4px;
          right: 10px;
          top: 10px;
        }

        .repo-link {
          padding: 8px;
          width: 36px;
          height: 36px;
          justify-content: center;
          border-radius: 50%;
          gap: 0;
        }

        .repo-link svg:first-child {
          width: 20px;
          height: 20px;
          margin: 0;
        }

        .repo-link .star-icon,
        .repo-link .star-text {
          display: none;
        }
		
		/* 移动端二维码调整 */
		.qr-code {
			width: 60px;    /* 移动端固定宽度 */
			left: 10px;
			top: auto;
			bottom: 10px;
		}
      }

      /* 更新日志弹窗样式 */
      #changelog-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 400;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease;
      }

      #changelog-overlay.show {
        display: flex;
      }

      #changelog-box {
        background: linear-gradient(135deg, #7b5e7b, #4a3f5a);
        border: 4px solid #e8b74a;
        border-radius: 20px;
        padding: 30px 40px;
        text-align: center;
        color: #fff;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: popIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        max-width: 500px;
      }

      #changelog-box h2 {
        font-size: 28px;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        color: #e8b74a;
      }

      #changelog-content {
        text-align: left;
        margin: 20px 0;
        font-size: 16px;
        line-height: 1.6;
        max-height: 300px;
        overflow-y: auto;
        padding-right: 10px;
      }

      #changelog-content ul {
        padding-left: 20px;
      }

      #changelog-content li {
        margin-bottom: 5px;
      }

      .changelog-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }

      .changelog-buttons .btn {
        width: auto;
        padding: 8px 16px;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.5);
        border-color: #e8b74a;
        color: #e8b74a;
      }

      .changelog-buttons .btn:hover {
        background: #e8b74a;
        color: #1a1a1a;
      }
    </style>
  </head>

      <div id="control-panel">
        <div id="step-label">步 数</div>
        <div id="step-display">0</div>

    <div id="victory-overlay">
      <div id="victory-box">

    <!-- 更新日志弹窗 -->
    <div id="changelog-overlay">
      <div id="changelog-box">
        <h2>📢 更新日志 v1.3</h2>
        <div id="changelog-content">
          <ul>
            <li>✨ 电梯楼层 = 关卡编号！直接修改楼层即可切换关卡</li>
            <li>✨ 随机按钮只在当前关卡总数范围内随机</li>
            <li>优化：电梯数字改变时自动加载对应关卡布局</li>
          </ul>
        </div>
        <div class="changelog-buttons">
          <button class="btn" id="changelog-ok">我~知~道~啦~</button>
          <button class="btn" id="changelog-skip">了解 本次更新不再弹出</button>
          <button class="btn" id="changelog-ignore">永久忽略</button>
        </div>
      </div>
    </div>

    <script>
      // ============================================================
      // 更新日志配置 (升级到 v1.3)
      // ============================================================
      const CHANGELOG_VERSION = 'v1.3'; // 当前版本号
      const changelogOverlay = document.getElementById('changelog-overlay');

      function shouldShowChangelog() {
        if (localStorage.getItem('changelog_permanent_ignore') === 'true') {
          return false;
        }
        const lastVersion = localStorage.getItem('changelog_last_version');
        if (lastVersion === CHANGELOG_VERSION) {
          return false;
        }
        return true;
      }

      function hideChangelog() {
        changelogOverlay.classList.remove('show');
      }

      function showChangelog() {
        changelogOverlay.classList.add('show');
      }

      document.getElementById('changelog-ok').addEventListener('click', () => {
        hideChangelog();
      });

      document.getElementById('changelog-skip').addEventListener('click', () => {
        hideChangelog();
        localStorage.setItem('changelog_last_version', CHANGELOG_VERSION);
      });

      document.getElementById('changelog-ignore').addEventListener('click', () => {
        hideChangelog();
        localStorage.setItem('changelog_permanent_ignore', 'true');
      });

      // ============================================================
      // 关卡配置
      // ============================================================
      const COLS = 4;
      const ROWS = 5;
      const GAP = 2;

      const TYPES = {
        "2x2": [2, 2],
        "1x2": [1, 2],
        "2x1": [2, 1],
        "1x1": [1, 1],
      };

      // ★★★ 关卡参数列表 ★★★
      const LEVELS = [
        { // 关卡1 (索引0): 横刀立马
          name: '横刀立马',
          layout: [
            { id: "michelle", type: "2x2", x: 1, y: 0, img: "images/michelle.png" },
			
            { id: "nyamu", type: "1x2", x: 0, y: 0, img: "images/nyamu.png" },
            { id: "moca", type: "1x2", x: 3, y: 0, img: "images/moca.png" },
            { id: "arisa", type: "1x2", x: 0, y: 2, img: "images/arisa.png" },
            { id: "eve", type: "1x2", x: 3, y: 2, img: "images/eve.png" },
			
            { id: "yukina", type: "2x1", x: 1, y: 2, img: "images/yukina.png" },
			
            { id: "saya", type: "1x1", x: 1, y: 3, img: "images/saya.png" },
            { id: "box", type: "1x1", x: 2, y: 3, img: "images/box.png" },
            { id: "otae", type: "1x1", x: 0, y: 4, img: "images/otae.png" },
            { id: "tsukushi", type: "1x1", x: 3, y: 4, img: "images/tsukushi.png" },
          ]
        },
        { // 关卡2 (索引1): 
          name: '大路通天',
          layout: [
            { id: "michelle", type: "2x2", x: 1, y: 0, img: "images/michelle.png" },
			
            { id: "nyamu", type: "1x2", x: 0, y: 0, img: "images/nyamu.png" },
            { id: "moca", type: "1x2", x: 0, y: 2, img: "images/moca.png" },

      // 当前游戏状态
      let blocks = [];
      let steps = 0;
      let solving = false;

      // 提示系统状态
      let hintSolution = null;
      let hintIndex = 0;
      let hintStateKey = null;
      let hintWorker = null;
      let hintComputing = false;

      // 拖拽状态
      let dragState = null;

      // DOM 引用
      const boardEl = document.getElementById("board");
      const stepDisplay = document.getElementById("step-display");
      const victoryOverlay = document.getElementById("victory-overlay");
      const victorySteps = document.getElementById("victory-steps");
      const elevatorFloor = document.getElementById("elevator-floor");
      const customFloorInput = document.getElementById("custom-floor");
      const randomFloorBtn = document.getElementById("random-floor");

      // ============================================================
      // 电梯楼层 = 关卡编号 (1 ~ LEVELS.length)
      // ============================================================
      function getTotalLevels() {
        return LEVELS.length;
      }

      // 根据楼层数字(1-based)加载关卡
      function loadLevelByFloor(floor) {
        let levelIndex = floor - 1;
        // 边界保护
        if (levelIndex < 0) levelIndex = 0;
        if (levelIndex >= LEVELS.length) levelIndex = LEVELS.length - 1;

        const levelData = LEVELS[levelIndex];
        blocks = deepCloneLayout(levelData.layout);
        // 重置步数等相关状态
        steps = 0;
        stepDisplay.textContent = "0";
        victoryOverlay.classList.remove("show");
        hintSolution = null;
        hintIndex = 0;
        hintStateKey = null;
        if (hintWorker) {
          hintWorker.terminate();
          hintWorker = null;
        }
        const btnHint = document.getElementById("btn-hint");
        if (btnHint) {
          btnHint.disabled = false;
          btnHint.textContent = "提 示";
        }
        renderBoard();

        // 同步电梯显示
        elevatorFloor.textContent = levelIndex + 1;
        customFloorInput.value = levelIndex + 1;
        customFloorInput.max = getTotalLevels(); // 动态更新max
      }

      // 更新电梯楼层并加载对应关卡
      function updateElevatorFloor(value) {
        let num = parseInt(value, 10);
        const maxLevel = getTotalLevels();
        if (isNaN(num) || num < 1) num = 1;
        if (num > maxLevel) num = maxLevel;

        // 如果楼层没变，但可能因为输入越界被修正，仍需同步
        const currentFloor = parseInt(elevatorFloor.textContent, 10);
        if (currentFloor !== num) {
          // 真正切换关卡
          loadLevelByFloor(num);
        } else {
          // 只是修正输入框的值
          elevatorFloor.textContent = num;
          customFloorInput.value = num;
        }
      }

      // 监听输入框变化
      customFloorInput.addEventListener('input', (e) => {
        updateElevatorFloor(e.target.value);
      });

		// 电梯楼层点击事件 - 单击+1，双击-1
		let clickTimer = null;
		elevatorFloor.addEventListener('click', (e) => {
		  // 阻止事件冒泡，避免影响到其他元素
		  e.stopPropagation();
		  
		  if (clickTimer === null) {
			// 第一次点击，设置定时器等待双击
			clickTimer = setTimeout(() => {
			  // 单击事件：楼层+1
			  const currentFloor = parseInt(elevatorFloor.textContent, 10);
			  const maxLevel = getTotalLevels();
			  if (currentFloor < maxLevel) {
				updateElevatorFloor(currentFloor + 1);
			  }
			  clickTimer = null;
			}, 250); // 250ms内双击判定为双击
		  } else {
			// 双击事件：取消单击，执行双击操作（楼层-1）
			clearTimeout(clickTimer);
			clickTimer = null;
			
			const currentFloor = parseInt(elevatorFloor.textContent, 10);
			if (currentFloor > 1) {
			  updateElevatorFloor(currentFloor - 1);
			}
		  }
		});
      // 随机按钮：在 1 ~ 总关卡数 之间随机
      randomFloorBtn.addEventListener('click', () => {
        const max = getTotalLevels();
        const randomNum = Math.floor(Math.random() * max) + 1; // 1~max
        updateElevatorFloor(randomNum);
      });

      // ============================================================
      // 渲染 & 工具函数
      // ============================================================
      function deepCloneLayout(layout) {
        return layout.map((b) => ({ ...b }));
      }

      function getCellSize() {
        const boardRect = boardEl.getBoundingClientRect();
        return {
          cellW: boardRect.width / COLS,
          cellH: boardRect.height / ROWS,
        };
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        const { cellW, cellH } = getCellSize();

        blocks.forEach((block) => {
          const [w, h] = TYPES[block.type];
          const el = document.createElement("div");
          el.className = "block";
          el.id = "block-" + block.id;
          el.style.width = cellW * w - GAP * 2 + "px";
          el.style.height = cellH * h - GAP * 2 + "px";
          el.style.left = block.x * cellW + GAP + "px";
          el.style.top = block.y * cellH + GAP + "px";

          const img = document.createElement("img");
          img.src = block.img;
          img.alt = block.id;
          img.draggable = false;
          el.appendChild(img);

          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            startDrag(block.id, e.clientX, e.clientY);
          });

          el.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDrag(block.id, touch.clientX, touch.clientY);
          });

          boardEl.appendChild(el);
        });
      }

      function updateBlockPosition(block) {
        const { cellW, cellH } = getCellSize();
        const el = document.getElementById("block-" + block.id);
        if (!el) return;
        el.style.left = block.x * cellW + GAP + "px";
        el.style.top = block.y * cellH + GAP + "px";
      }

      // ============================================================
      // 拖拽交互
      // ============================================================
      function startDrag(blockId, startX, startY) {
        if (solving) return;
        const block = blocks.find((b) => b.id === blockId);
        if (!block) return;

        const el = document.getElementById("block-" + blockId);
        el.classList.add("dragging");

        dragState = {
          blockId,
          startX,
          startY,
          origGridX: block.x,
          origGridY: block.y,
          moved: false,
        };
      }

      function onDragMove(clientX, clientY) {
        if (!dragState) return;

        const { cellW, cellH } = getCellSize();
        const dx = clientX - dragState.startX;
        const dy = clientY - dragState.startY;

        const threshold = Math.min(cellW, cellH) * 0.1;

        if (dragState.moved) return;

        let moveDx = 0;
        let moveDy = 0;

        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > threshold) moveDx = 1;
          else if (dx < -threshold) moveDx = -1;
        } else {
          if (dy > threshold) moveDy = 1;
          else if (dy < -threshold) moveDy = -1;
        }

        if (moveDx !== 0 || moveDy !== 0) {
          const success = moveBlock(dragState.blockId, moveDx, moveDy);
          if (success) dragState.moved = true;
        }
      }

      function endDrag() {
        if (!dragState) return;
        const el = document.getElementById("block-" + dragState.blockId);
        if (el) el.classList.remove("dragging");
        dragState = null;
      }

      document.addEventListener("mousemove", (e) => onDragMove(e.clientX, e.clientY));
      document.addEventListener("mouseup", endDrag);
      document.addEventListener("touchmove", (e) => {
        if (dragState) {
          e.preventDefault();
          const touch = e.touches[0];
          onDragMove(touch.clientX, touch.clientY);
        }
      }, { passive: false });
      document.addEventListener("touchend", endDrag);
      document.addEventListener("touchcancel", endDrag);

      // ============================================================
      // 音效配置
      // ============================================================
      const audioCache = {};
      const CHARACTER_AUDIO_MAP = {
        eve: ["images/eve.mp3"],
        otae: ["images/otae1.mp3","images/otae2.mp3"], 
        moca: ["images/moca1.mp3",'images/moca2.mp3'],
        nyamu: ["images/nyamu.mp3"],
        saya: ["images/saya.mp3"],
        yukina: ["images/ykn.mp3"],
        arisa: ["images/aras.mp3"],
        tsukushi: ["images/tsukushi.mp3"],
        aya: ["images/aya.mp3"],
        chisato: ["images/chisato.mp3"]
      };
      const UI_AUDIO_MAP = { reset: "images/reset.mp3" };

      function tryPlayAudio(src) {
        if (!src) return;
        if (audioCache[src]) {
          const a = audioCache[src].cloneNode();
          a.volume = audioCache[src].volume || 0.6;
          a.play().catch(() => {});
          return;
        }
        const audio = new Audio(src);
        audio.volume = 0.6;
        const p = audio.play();
        if (p !== undefined) {
          p.then(() => { audioCache[src] = audio; }).catch(() => {});
        }
      }

      let voiceEnabled = true;
      function toggleVoice() {
        voiceEnabled = !voiceEnabled;
        const btn = document.getElementById("btn-voice");
        if (btn) btn.classList.toggle("toggle-on", voiceEnabled);
      }

      function playCharacterAudio(charId) {
        if (!voiceEnabled) return;
        const variants = CHARACTER_AUDIO_MAP[charId];
        if (!variants || variants.length === 0) return;
        const randomIndex = Math.floor(Math.random() * variants.length);
        tryPlayAudio(variants[randomIndex]);
      }

      const typeSoundMap = {
        "2x2": "images/2x2.mp3",
        "1x2": "images/1x2.mp3",
        "2x1": "images/1x2.mp3",
        "1x1": "images/1x1.mp3",
      };

      function playMoveSound(block) {
        const typeSound = typeSoundMap[block.type];
        if (typeSound) tryPlayAudio(typeSound);
        if (block.id !== "box") {
          playCharacterAudio(block.id);
        }
      }

      function playWinSound() { tryPlayAudio("images/win.mp3"); }
      function playResetSound() { if (voiceEnabled) tryPlayAudio(UI_AUDIO_MAP.reset); }

      function preloadSounds() {
        const audioList = [
          "images/win.mp3",
          ...Object.values(typeSoundMap),
          ...Object.values(CHARACTER_AUDIO_MAP).flat(),
          UI_AUDIO_MAP.reset,
        ];
        const uniqueSrcs = [...new Set(audioList)];
        uniqueSrcs.forEach((src) => {
          if (src && !audioCache[src]) {
            const audio = new Audio();
            audio.src = src;
            audio.volume = 0.6;
            audio.load();
            audioCache[src] = audio;
          }
        });
      }

      // ============================================================
      // 碰撞检测与移动
      // ============================================================
      function buildGrid(blocksState) {
        const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        blocksState.forEach((b) => {
          const [w, h] = TYPES[b.type];
          for (let dy = 0; dy < h; dy++) {
            for (let dx = 0; dx < w; dx++) {
              grid[b.y + dy][b.x + dx] = b.id;
            }
          }
        });
        return grid;
      }

      function canMove(block, dx, dy, grid) {
        const [w, h] = TYPES[block.type];
        const nx = block.x + dx;
        const ny = block.y + dy;
        if (nx < 0 || ny < 0 || nx + w > COLS || ny + h > ROWS) return false;
        for (let r = 0; r < h; r++) {
          for (let c = 0; c < w; c++) {
            const occupant = grid[ny + r][nx + c];
            if (occupant !== null && occupant !== block.id) return false;
          }
        }
        return true;
      }

      function moveBlock(blockId, dx, dy) {
        const block = blocks.find((b) => b.id === blockId);
        if (!block) return false;

        const grid = buildGrid(blocks);
        if (!canMove(block, dx, dy, grid)) return false;

        block.x += dx;
        block.y += dy;
        updateBlockPosition(block);
        playMoveSound(block);

        if (!solving) {
          hintSolution = null;
          hintIndex = 0;
          hintStateKey = null;
          steps++;
          stepDisplay.textContent = steps;
        }

        if (block.id === "michelle" && block.x === 1 && block.y === 3) {
          setTimeout(() => {
            playWinSound();
            victorySteps.textContent = steps;
            victoryOverlay.classList.add("show");
          }, 300);
        }
        return true;
      }

      // 重置游戏 (重设当前关卡，步数清零)
      function resetGame() {
        playResetSound();
        // 直接根据当前电梯楼层重新加载
        const currentFloor = parseInt(elevatorFloor.textContent, 10) || 1;
        loadLevelByFloor(currentFloor);
      }

      // ============================================================
      // 提示系统
      // ============================================================
      const workerCode = `
        const COLS = 4, ROWS = 5;
        const TYPES = { '2x2': [2,2], '1x2': [1,2], '2x1': [2,1], '1x1': [1,1] };
        function encodeState(bs) {
          const g = new Uint8Array(20);
          for (const b of bs) {
            const [w, h] = TYPES[b.type];
            if (b.id === 'michelle') {
              g[b.y * COLS + b.x] = 6;
              g[b.y * COLS + b.x + 1] = 7;
              g[(b.y + 1) * COLS + b.x] = 8;
              g[(b.y + 1) * COLS + b.x + 1] = 9;
            } else if (b.type === '1x1') {
              g[b.y * COLS + b.x] = 1;
            } else if (b.type === '1x2') {
              g[b.y * COLS + b.x] = 2;
              g[(b.y + 1) * COLS + b.x] = 3;
            } else if (b.type === '2x1') {
              g[b.y * COLS + b.x] = 4;
              g[b.y * COLS + b.x + 1] = 5;
            }
          }
          return String.fromCharCode.apply(null, g);
        }
        function buildGrid(bs) {
          const grid = [];
          for (let r = 0; r < ROWS; r++) grid[r] = new Array(COLS).fill(-1);
          for (let i = 0; i < bs.length; i++) {
            const b = bs[i];
            const [w, h] = TYPES[b.type];
            for (let dy = 0; dy < h; dy++)
              for (let dx = 0; dx < w; dx++)
                grid[b.y + dy][b.x + dx] = i;
          }
          return grid;
        }
        function canMove(b, dx, dy, grid, idx) {
          const [w, h] = TYPES[b.type];
          const nx = b.x + dx, ny = b.y + dy;
          if (nx < 0 || ny < 0 || nx + w > COLS || ny + h > ROWS) return false;
          for (let r = 0; r < h; r++)
            for (let c = 0; c < w; c++) {
              const occ = grid[ny + r][nx + c];
              if (occ !== -1 && occ !== idx) return false;
            }
          return true;
        }
        self.onmessage = function(e) {
          const startBlocks = e.data;
          const visited = new Set();
          const startKey = encodeState(startBlocks);
          visited.add(startKey);
          const queue = [startBlocks.map(b => ({...b}))];
          const parent = [null];
          let head = 0;
          const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
          while (head < queue.length) {
            const state = queue[head];
            const michIdx = state.findIndex(b => b.id === 'michelle');
            if (state[michIdx].x === 1 && state[michIdx].y === 3) {
              const path = [];
              let cur = head;
              while (parent[cur] !== null) {
                const p = parent[cur];
                path.unshift({ id: queue[p.stateIdx][p.blockIdx].id, dx: p.dx, dy: p.dy });
                cur = p.stateIdx;
              }
              self.postMessage({ success: true, moves: path });
              return;
            }
            const grid = buildGrid(state);
            for (let bi = 0; bi < state.length; bi++) {
              const b = state[bi];
              for (const [dx, dy] of dirs) {
                if (!canMove(b, dx, dy, grid, bi)) continue;
                const ns = state.map(x => ({...x}));
                ns[bi] = {...ns[bi], x: ns[bi].x + dx, y: ns[bi].y + dy};
                const key = encodeState(ns);
                if (visited.has(key)) continue;
                visited.add(key);
                queue.push(ns);
                parent.push({ stateIdx: head, blockIdx: bi, dx, dy });
              }
            }
            head++;
          }
          self.postMessage({ success: false });
        };
      `;

      function getHint() {
        if (solving || hintComputing) return;
        const btnHint = document.getElementById("btn-hint");

        if (hintSolution && hintIndex < hintSolution.length) {
          const move = hintSolution[hintIndex];
          solving = true;
          moveBlock(move.id, move.dx, move.dy);
          steps++; stepDisplay.textContent = steps;
          solving = false;
          hintIndex++;
          if (hintIndex >= hintSolution.length) { hintSolution = null; hintStateKey = null; }
          return;
        }

        hintComputing = true;
        btnHint.disabled = true;
        btnHint.textContent = "思考中…";

        const blob = new Blob([workerCode], { type: "application/javascript" });
        const url = URL.createObjectURL(blob);
        hintWorker = new Worker(url);

        hintWorker.onmessage = function (e) {
          URL.revokeObjectURL(url);
          hintWorker = null;
          hintComputing = false;
          btnHint.disabled = false;
          btnHint.textContent = "提 示";

          if (e.data.success && e.data.moves.length > 0) {
            hintSolution = e.data.moves;
            hintIndex = 0;
            const move = hintSolution[hintIndex];
            solving = true;
            moveBlock(move.id, move.dx, move.dy);
            steps++; stepDisplay.textContent = steps;
            solving = false;
            hintIndex++;
            if (hintIndex >= hintSolution.length) { hintSolution = null; hintStateKey = null; }
          }
        };
        hintWorker.onerror = function () {
          URL.revokeObjectURL(url);
          hintWorker = null;
          hintComputing = false;
          btnHint.disabled = false;
          btnHint.textContent = "提 示";
          alert("求解出错");
        };
        hintWorker.postMessage(deepCloneLayout(blocks));
      }

      // ============================================================
      // 启动
      // ============================================================
      window.addEventListener("load", () => {
        preloadSounds();
        // 初始化楼层max
        customFloorInput.max = getTotalLevels();
        // 加载默认关卡 (楼层1)
        loadLevelByFloor(1);
        if (shouldShowChangelog()) {
          showChangelog();
        }
      });

      window.addEventListener("resize", () => {
        renderBoard();
      });
    </script>
  </body>
</html>
