<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>米歇尔华容道 · 布局生成器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #2d3e2d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      padding: 10px;
    }
    .helper-container {
      background: #5a7a4c;
      border-radius: 24px;
      padding: 24px 20px 20px 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
      max-width: 1100px;
      width: 100%;
    }
    h2 {
      color: #f9e0a0;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 400;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #3a4f2a;
    }
    .sub {
      text-align: center;
      color: #c4b078;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .board-view {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #3f5c35;
      border: 4px solid #b5944b;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: inset 0 0 0 2px #6b8c4f;
    }
    #helper-board-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 1;
    }
    #helper-blocks-layer {
      position: absolute;
      top: 4.8%; left: 25.3%;
      width: 49.5%; height: 89.5%;
      z-index: 10;
      background: transparent;
    }
    .block-helper {
      position: absolute;
      cursor: grab;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      border: 2px solid #ffd966;
      z-index: 20;
    }
    .block-helper.dragging {
      cursor: grabbing;
      z-index: 100;
      filter: brightness(1.2);
      box-shadow: 0 8px 20px gold;
      transition: none;
    }
    .block-helper img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      background: #3e5736;
      padding: 12px 20px;
      border-radius: 40px;
      border: 2px solid #b5944b;
    }
    .block-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #2c402c;
      padding: 8px 12px;
      border-radius: 40px;
    }
    .palette-item {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: #5a7750;
      border: 2px solid #e8b74a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: 0.1s;
    }
    .palette-item.active {
      border: 4px solid #ffb347;
      transform: scale(1.05);
      box-shadow: 0 0 0 2px #f9e076;
    }
    .palette-item img {
      width: 90%; height: 90%;
      object-fit: contain;
    }
    .btn-helper {
      background: #7b5e3b;
      border: 2px solid #e8b74a;
      color: #ffecb3;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }
    .btn-helper:hover {
      background: #b5944b;
      color: #1f2e1f;
    }
    .btn-copy {
      background: #4f7a5c;
      border-color: #f4c542;
      color: #fff5d6;
      font-size: 16px;
    }
    .output-area {
      margin-top: 20px;
      background: #1e2a1e;
      border: 3px solid #b5944b;
      border-radius: 30px;
      padding: 15px 20px;
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffd966;
      margin-bottom: 10px;
    }
    pre {
      background: #0f180f;
      color: #d4e6b5;
      padding: 15px;
      border-radius: 20px;
      overflow-x: auto;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      border: 1px solid #7a954a;
      max-height: 250px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .copy-hint {
      color: #aacc88;
      font-size: 13px;
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="helper-container">
  <h2>🎴 米歇尔华容道 · 布局生成器</h2>
  <div class="sub">选中角色 → 空白处放置 · 拖拽调整 · 复制布局</div>

  <!-- 棋盘 -->
  <div class="board-view">
    <img id="helper-board-bg" src="images/board1.png" alt="棋盘背景" 
         onerror="this.style.backgroundColor='#4a6741';this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22960%22%20height%3D%22540%22%20viewBox%3D%220%200%20960%20540%22%3E%3Crect%20width%3D%22960%22%20height%3D%22540%22%20fill%3D%22%234a6741%22%2F%3E%3Ctext%20x%3D%22200%22%20y%3D%22270%22%20fill%3D%22%23c4a96a%22%20font-size%3D%2236%22%3Eboard1.png%20缺失%3C%2Ftext%3E%3C%2Fsvg%3E'">
    <div id="helper-blocks-layer"></div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="block-palette" id="palette-container"></div>
    <div style="display: flex; gap: 8px;">
      <button class="btn-helper" id="reset-helper">🗑️ 清空</button>
      <button class="btn-helper btn-copy" id="copy-layout-btn">📋 复制布局</button>
    </div>
  </div>

  <!-- 预览区 -->
  <div class="output-area">
    <div class="output-header">
      <span>📄 当前布局</span>
    </div>
    <pre id="layout-preview">// 摆放角色生成布局</pre>
    <div class="copy-hint" id="copy-message"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- 常量 ----------
    const COLS = 4, ROWS = 5, GAP = 2;
    const TYPES = { '2x2': [2,2], '1x2': [1,2], '2x1': [2,1], '1x1': [1,1] };

    // 所有可用角色
    const AVAILABLE_IDS = [
      { id: 'michelle', type: '2x2', img: 'images/michelle.png'},
      { id: 'nyamu',    type: '1x2', img: 'images/nyamu.png'},
      { id: 'moca',     type: '1x2', img: 'images/moca.png'},
      { id: 'arisa',    type: '1x2', img: 'images/arisa.png' },
      { id: 'eve',      type: '1x2', img: 'images/eve.png'},
      { id: 'yukina',   type: '2x1', img: 'images/yukina.png'},
      { id: 'saya',     type: '1x1', img: 'images/saya.png'},
      { id: 'box',      type: '1x1', img: 'images/box.png'},
      { id: 'otae',     type: '1x1', img: 'images/otae.png'},
      { id: 'tsukushi', type: '1x1', img: 'images/tsukushi.png'},
      { id: 'kokoro',   type: '2x1', img: 'images/kokoro.png'},
      { id: 'mashiro',  type: '2x1', img: 'images/mashiro.png'},
      { id: 'tomori',   type: '2x1', img: 'images/tomori.png'},
      { id: 'aya',      type: '1x1', img: 'images/aya.png'},
      { id: 'chisato',  type: '1x1', img: 'images/chisato.png'}
    ];

    // 状态
    let blocks = [];
    let dragState = null;
    let activeId = 'michelle';
    const layer = document.getElementById('helper-blocks-layer');
    const preview = document.getElementById('layout-preview');
    const copyMsg = document.getElementById('copy-message');

    // ---------- 辅助函数 ----------
    function getItemById(id) {
      return AVAILABLE_IDS.find(i => i.id === id);
    }

    function getCellSize() {
      const rect = layer.getBoundingClientRect();
      return { cellW: rect.width / COLS, cellH: rect.height / ROWS };
    }

    // ---------- 调色板 ----------
    function buildPalette() {
      const container = document.getElementById('palette-container');
      container.innerHTML = '';
      AVAILABLE_IDS.forEach(item => {
        const div = document.createElement('div');
        div.className = `palette-item ${activeId === item.id ? 'active' : ''}`;
        div.dataset.id = item.id;
        div.dataset.type = item.type;
        div.dataset.img = item.img;
        const img = document.createElement('img');
        img.src = item.img;
        img.onerror = (e) => { e.target.style.display = 'none'; e.target.parentNode.innerText = item.id.slice(0,2); };
        div.appendChild(img);
        div.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
          div.classList.add('active');
          activeId = item.id;
        });
        container.appendChild(div);
      });
    }
    buildPalette();

    // ---------- 碰撞检测 ----------
    function buildGrid(blocksArr) {
      const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      blocksArr.forEach(b => {
        const [w, h] = TYPES[b.type];
        for (let dy = 0; dy < h; dy++) {
          for (let dx = 0; dx < w; dx++) {
            if (b.y + dy < ROWS && b.x + dx < COLS) grid[b.y+dy][b.x+dx] = b.id;
          }
        }
      });
      return grid;
    }

    function canMove(block, dx, dy, grid) {
      const [w, h] = TYPES[block.type];
      const nx = block.x + dx, ny = block.y + dy;
      if (nx < 0 || ny < 0 || nx + w > COLS || ny + h > ROWS) return false;
      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          if (grid[ny+r][nx+c] !== null && grid[ny+r][nx+c] !== block.id) return false;
        }
      }
      return true;
    }

    function moveBlock(blockId, dx, dy) {
      const block = blocks.find(b => b.id === blockId);
      if (!block) return false;
      const grid = buildGrid(blocks);
      if (!canMove(block, dx, dy, grid)) return false;
      block.x += dx; block.y += dy;
      updateBlockPosition(block);
      return true;
    }

    function updateBlockPosition(block) {
      const el = document.querySelector(`.block-helper[data-id="${block.id}"]`);
      if (!el) return;
      const { cellW, cellH } = getCellSize();
      const [w, h] = TYPES[block.type];
      el.style.left = (block.x * cellW + GAP) + 'px';
      el.style.top = (block.y * cellH + GAP) + 'px';
    }

    function renderBlocks() {
      layer.innerHTML = '';
      const { cellW, cellH } = getCellSize();
      blocks.forEach(block => {
        const [w, h] = TYPES[block.type];
        const el = document.createElement('div');
        el.className = 'block-helper';
        el.dataset.id = block.id;
        el.style.width = (cellW * w - GAP*2) + 'px';
        el.style.height = (cellH * h - GAP*2) + 'px';
        el.style.left = (block.x * cellW + GAP) + 'px';
        el.style.top = (block.y * cellH + GAP) + 'px';
        const img = document.createElement('img');
        img.src = block.img;
        el.appendChild(img);
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          startDrag(block.id, e.clientX, e.clientY);
        });
        el.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          startDrag(block.id, touch.clientX, touch.clientY);
        });
        layer.appendChild(el);
      });
    }

    // ---------- 拖拽 ----------
    function startDrag(blockId, startX, startY) {
      const block = blocks.find(b => b.id === blockId);
      if (!block) return;
      const el = document.querySelector(`.block-helper[data-id="${blockId}"]`);
      el?.classList.add('dragging');
      dragState = { blockId, startX, startY, moved: false };
    }

    function onDragMove(clientX, clientY) {
      if (!dragState) return;
      const { cellW, cellH } = getCellSize();
      const dx = clientX - dragState.startX;
      const dy = clientY - dragState.startY;
      const threshold = Math.min(cellW, cellH) * 0.1;
      if (dragState.moved) return;
      let moveDx = 0, moveDy = 0;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > threshold) moveDx = 1;
        else if (dx < -threshold) moveDx = -1;
      } else {
        if (dy > threshold) moveDy = 1;
        else if (dy < -threshold) moveDy = -1;
      }
      if (moveDx !== 0 || moveDy !== 0) {
        if (moveBlock(dragState.blockId, moveDx, moveDy)) {
          dragState.moved = true;
          updatePreviewText();
        }
      }
    }

    function endDrag() {
      if (dragState) {
        const el = document.querySelector(`.block-helper[data-id="${dragState.blockId}"]`);
        el?.classList.remove('dragging');
        dragState = null;
        updatePreviewText();
      }
    }

    document.addEventListener('mousemove', (e) => onDragMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchmove', (e) => {
      if (dragState) { e.preventDefault(); const touch = e.touches[0]; onDragMove(touch.clientX, touch.clientY); }
    }, { passive: false });
    document.addEventListener('touchend', endDrag);
    document.addEventListener('touchcancel', endDrag);

    // ---------- 添加角色 ----------
    function tryAddBlock() {
      const item = getItemById(activeId);
      if (!item) return;
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const [w, h] = TYPES[item.type];
          if (x + w > COLS || y + h > ROWS) continue;
          let conflict = false;
          for (let dy = 0; dy < h; dy++) {
            for (let dx = 0; dx < w; dx++) {
              if (blocks.some(b => {
                const [bw, bh] = TYPES[b.type];
                return (b.x <= x+dx && x+dx < b.x + bw) && (b.y <= y+dy && y+dy < b.y + bh);
              })) { conflict = true; break; }
            }
            if (conflict) break;
          }
          if (!conflict) {
            if (blocks.some(b => b.id === item.id)) {
              alert(`角色 ${item.id} 已存在`);
              return;
            }
            blocks.push({ id: item.id, type: item.type, x, y, img: item.img });
            renderBlocks();
            updatePreviewText();
            return;
          }
        }
      }
      alert('没有足够空间放置');
    }

    layer.addEventListener('mousedown', (e) => {
      if (e.target === layer || e.target.id === 'helper-blocks-layer') {
        e.preventDefault();
        tryAddBlock();
      }
    });
    layer.addEventListener('touchstart', (e) => {
      if (e.target === layer || e.target.id === 'helper-blocks-layer') {
        e.preventDefault();
        tryAddBlock();
      }
    });

    // ---------- 清空 ----------
    document.getElementById('reset-helper').addEventListener('click', () => {
      blocks = [];
      renderBlocks();
      updatePreviewText();
    });

    // ========== 缩进输出 ==========
    function generateLayoutText() {
      if (blocks.length === 0) return '// 未放置角色';
      
      // 按id排序
      const sorted = [...blocks].sort((a,b) => a.id.localeCompare(b.id));
      
      // layout: [ 前10个空格
      let str = '          layout: [\n';
      
      // 每一行前12个空格 + 对象
      sorted.forEach(b => {
        str += `            { id: "${b.id}", type: "${b.type}", x: ${b.x}, y: ${b.y}, img: "images/${b.id}.png" },\n`;
      });
      
      // 结束符前10个空格
      str += '          ]';
      
      return str;
    }

    function updatePreviewText() {
      preview.textContent = generateLayoutText();
    }

    // ---------- 复制到剪贴板 ----------
    document.getElementById('copy-layout-btn').addEventListener('click', async () => {
      const text = generateLayoutText();
      try {
        await navigator.clipboard.writeText(text);
        copyMsg.textContent = '✅ 已复制到剪贴板！';
        setTimeout(() => { copyMsg.textContent = ''; }, 2000);
      } catch (err) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        copyMsg.textContent = '📋 复制成功';
        setTimeout(() => { copyMsg.textContent = ''; }, 2000);
      }
    });

    // 初始化
    window.addEventListener('load', () => {
      blocks = [];
      renderBlocks();
      updatePreviewText();
    });

    window.addEventListener('resize', () => { renderBlocks(); });
  })();
</script>
</body>
</html>
